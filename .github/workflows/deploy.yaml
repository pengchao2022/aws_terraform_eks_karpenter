name: Terraform Deploy EKS with Karpenter

on:
  pull_request:
    types:
      - closed
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'modules/**'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  TF_VERSION: 1.5.0
  AWS_REGION: us-east-1
  STATE_BUCKET: pengchao2022-terraform-state
  STATE_KEY: eks-karpenter/terraform.tfstate

permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Terraform

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -reconfigure

      # 1️⃣ 第一步：确保底层硬件就绪（因为你之前跑成功了，这步现在会秒过刷新）
      # 它会确保 VPC、EKS、系统节点、CoreDNS Add-on 全部牢固地写入 State 中
      - name: Step 1 - Deploy Base Infrastructure
        run: |
          terraform apply -auto-approve \
            -target=module.vpc \
            -target=module.eks \
            -var="environment=${{ github.event.inputs.environment || 'dev' }}"

      # 2️⃣ 第二步：单独灌入 Karpenter 的 Helm 释放（核心改变！）
      # 这一步会成功把 Karpenter 控制器和它附带的 CRD（NodePool, EC2NodeClass）强行安装进 K8s
      - name: Step 2 - Install Karpenter Helm Release
        run: |
          terraform apply -auto-approve \
            -target=module.karpenter.helm_release.karpenter \
            -var="environment=${{ github.event.inputs.environment || 'dev' }}"

      # 3️⃣ 第三步：全量无保留 Apply
      # 此时底层有了、Karpenter 跑起来了、CRD 认得了，Terraform 扫描时畅通无阻，完美补齐自定义资源！
      - name: Step 3 - Deploy Custom Resources & Verify
        run: |
          terraform apply -auto-approve \
            -var="environment=${{ github.event.inputs.environment || 'dev' }}"

      # 🔍 验证集群状态
      - name: Verify Cluster and Nodes
        run: |
          echo "Configuring kubectl..."
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name allen-eks-karpenter
          
          echo "Checking system nodes..."
          kubectl get nodes -o wide
          
          echo "Checking Karpenter deployment status..."
          kubectl get pods -n karpenter -o wide || echo "Karpenter pods not found"

      - name: Terraform Output
        if: always()
        run: |
          echo "## Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          terraform output >> $GITHUB_STEP_SUMMARY || echo "No outputs available"