name: Terraform Deploy EKS with Karpenter

on:
  pull_request:
    types: [closed]
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'modules/**'
      - '.github/workflows/deploy.yaml'

env:
  TF_VERSION: 1.5.0
  AWS_REGION: us-east-1 
  STATE_BUCKET: pengchao2022-terraform-state
  STATE_KEY: eks-karpenter/terraform.tfstate

# 🌟 核心安全加固：必须显式声明 OIDC 写入权限，否则 AWS 连不上
permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    name: Terraform Infrastructure Deployment
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false # 🌟 关闭 wrapper，确保能够以纯文本读取 terraform output

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-EKS-Karpenter-Deploy

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -reconfigure \
            -upgrade # 🌟 强力刷新缓存，彻底杜绝 Unexpected attribute 灵异报错

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

      - name: Deploy & Configure Karpenter
        run: |
          # 1. 动态捕获 Terraform 刚刚创建出来的集群资源（零硬编码）
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          CLUSTER_ENDPOINT=$(terraform output -raw cluster_endpoint)
          KARPENTER_ROLE_ARN=$(terraform output -raw karpenter_role_arn)
          
          echo "Connecting to Cluster: $CLUSTER_NAME"
          echo "Using Karpenter Role: $KARPENTER_ROLE_ARN"
          
          # 2. 刷新本地 Kubeconfig 凭证
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name $CLUSTER_NAME
          
          # 3. 改用 Karpenter 官方推荐的公共 OCI 仓库直连安装
          # 🌟 修复点：去掉会引发 Helm 语法崩溃的空大括号，改用官方的标准配置对象注入
          helm upgrade --install karpenter oci://public.ecr.aws/karpenter/karpenter \
            --namespace karpenter --create-namespace \
            --version "1.0.6" \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${KARPENTER_ROLE_ARN} \
            --set settings.clusterName=${CLUSTER_NAME} \
            --set settings.clusterEndpoint=${CLUSTER_ENDPOINT} \
            --set controller.resources.requests.cpu=50m \
            --set controller.resources.requests.memory=128Mi \
            --set controller.resources.limits.cpu=200m \
            --set controller.resources.limits.memory=512Mi \
            --set replicas=1 \
            --set webhook.enabled=false \
            --set-json tolerations='[{"operator": "Exists"}]' # 🌟 降维打击：让 Karpenter 拥有最高容忍度，不管系统节点有什么污点，都能秒级塞进去！

          # 🌟 新增调试排查：先看一下 Karpenter 的 Pod 目前是什么状态，防止盲猜
          echo "Checking Karpenter Pods deployment status..."
          kubectl get pods -n karpenter
          
          # 🌟 修复点：给 Karpenter 软件大脑 5 分钟的宽裕时间在系统节点上冷启动和拉取镜像
          echo "Waiting for Karpenter Controller to be fully Running..."
          kubectl wait --namespace karpenter \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/name=karpenter \
            --timeout=300s || (kubectl describe pods -n karpenter && exit 1)

          # 4. 确保 Karpenter v1 CRDs 完全就绪
          echo "Waiting for Karpenter v1 CRDs to establish..."
          kubectl wait --for condition=established --timeout=90s crd/nodepools.karpenter.sh crd/ec2nodeclasses.karpenter.k8s.aws

          # 5. 🌟 完美适配 v1.0.x 的 Ubuntu 声明（使用 Custom + amiSelectorTerms）
          cat <<-EOF | kubectl apply -f -
          apiVersion: karpenter.k8s.aws/v1
          kind: EC2NodeClass
          metadata:
            name: default
          spec:
            amiFamily: Custom
            role: "KarpenterNodeRole-${CLUSTER_NAME}"
            amiSelectorTerms:
              - name: "ubuntu-eks-1.30-*" # 🌟 精准匹配 AWS 官方发布的 Ubuntu K8s 1.30 优化版镜像
                owner: "099720109477"     # 🌟 Canonical (Ubuntu 官方在 AWS 的账号 ID)，确保绝对安全正版
            subnetSelectorTerms:
              - tags:
                  karpenter.sh/discovery: ${CLUSTER_NAME}
            securityGroupSelectorTerms:
              - tags:
                  aws:eks:cluster-name: ${CLUSTER_NAME}
            tags:
              karpenter.sh/discovery: ${CLUSTER_NAME}
          EOF

          # 6. 🌟 下发 NodePool：完美对齐 v1 正式版的 Disruption 缩容策略参数
          cat <<-EOF | kubectl apply -f -
          apiVersion: karpenter.sh/v1
          kind: NodePool
          metadata:
            name: default
          spec:
            template:
              spec:
                nodeClassRef:
                  group: karpenter.k8s.aws
                  kind: EC2NodeClass
                  name: default
                requirements:
                  - key: kubernetes.io/arch
                    operator: In
                    values: ["amd64"]
                  - key: kubernetes.io/os
                    operator: In
                    values: ["linux"]
                  - key: karpenter.k8s.aws/instance-family
                    operator: In
                    values: ["t3"]
                  - key: karpenter.k8s.aws/instance-size
                    operator: In
                    values: ["micro", "small", "medium"]
                  - key: karpenter.sh/capacity-type
                    operator: In
                    values: ["on-demand"]
            limits:
              cpu: "6"
              memory: 4Gi
            disruption:
              consolidationPolicy: WhenEmptyOrUnderutilized # 🌟 核心修复：修改为 v1 官方支持的标准枚举值
              consolidateAfter: 1m
          EOF

          # 7. 🌟 创建占位 Deployment：严格对齐格式，强行逼迫 Karpenter 拉起 3 个真正的 Ubuntu Node
          cat <<-EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: keep-nodes
            namespace: default
          spec:
            replicas: 3
            selector:
              matchLabels:
                app: keep-nodes
            template:
              metadata:
                labels:
                  app: keep-nodes
              spec:
                containers:
                - name: pause
                  image: public.ecr.aws/eks-distro/kubernetes/pause:3.7
                  resources:
                    requests:
                      cpu: "1"
                      memory: 1Gi
          EOF