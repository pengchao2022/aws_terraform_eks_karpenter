name: Terraform Deploy EKS with Karpenter

on:
  pull_request:
    types: [closed]
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'modules/**'
      - '.github/workflows/deploy.yaml'

env:
  TF_VERSION: 1.5.0
  AWS_REGION: us-east-1 
  STATE_BUCKET: pengchao2022-terraform-state
  STATE_KEY: eks-karpenter/terraform.tfstate

# 🌟 核心安全加固：必须显式声明 OIDC 写入权限，否则 AWS 连不上
permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    name: Terraform Infrastructure Deployment
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false # 🌟 关闭 wrapper，确保能够以纯文本读取 terraform output

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-EKS-Karpenter-Deploy

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -reconfigure \
            -upgrade # 🌟 强力刷新缓存，彻底杜绝 Unexpected attribute 灵异报错

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

      - name: Deploy & Configure Karpenter
        run: |
          # 1. 动态捕获 Terraform 刚刚创建出来的集群资源（零硬编码）
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          CLUSTER_ENDPOINT=$(terraform output -raw cluster_endpoint)
          KARPENTER_ROLE_ARN=$(terraform output -raw karpenter_role_arn)
          
          echo "Connecting to Cluster: $CLUSTER_NAME"
          echo "Using Karpenter Role: $KARPENTER_ROLE_ARN"
          
          # 2. 刷新本地 Kubeconfig 凭证
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name $CLUSTER_NAME
          
          # 3. 改用 Karpenter 官方推荐的公共 OCI 仓库直连安装
          helm upgrade --install karpenter oci://public.ecr.aws/karpenter/karpenter \
            --namespace karpenter --create-namespace \
            --version "1.0.6" \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${KARPENTER_ROLE_ARN} \
            --set settings.clusterName=${CLUSTER_NAME} \
            --set settings.clusterEndpoint=${CLUSTER_ENDPOINT} \
            --set controller.resources.requests.cpu=100m \
            --set controller.resources.requests.memory=256Mi \
            --wait

          # 4. 确保 Karpenter v1 CRDs 完全就绪
          echo "Waiting for Karpenter v1 CRDs to establish..."
          kubectl wait --for condition=established --timeout=60s crd/nodepools.karpenter.sh crd/ec2nodeclasses.karpenter.k8s.aws

          # 5. 下发 EC2NodeClass（这里改用 <<-EOF，允许内部和结尾的 EOF 保持统一缩进）
          cat <<-EOF | kubectl apply -f -
          apiVersion: karpenter.k8s.aws/v1
          kind: EC2NodeClass
          metadata:
            name: default
          spec:
            amiFamily: Ubuntu
            role: "KarpenterNodeRole-${CLUSTER_NAME}"
            subnetSelectorTerms:
              - tags:
                  karpenter.sh/discovery: ${CLUSTER_NAME}
            securityGroupSelectorTerms:
              - tags:
                  aws:eks:cluster-name: ${CLUSTER_NAME}
            tags:
              karpenter.sh/discovery: ${CLUSTER_NAME}
          EOF

          # 6. 下发 NodePool
          cat <<-EOF | kubectl apply -f -
          apiVersion: karpenter.sh/v1
          kind: NodePool
          metadata:
            name: default
          spec:
            template:
              spec:
                nodeClassRef:
                  group: karpenter.k8s.aws
                  kind: EC2NodeClass
                  name: default
                requirements:
                  - key: kubernetes.io/arch
                    operator: In
                    values: ["amd64"]
                  - key: kubernetes.io/os
                    operator: In
                    values: ["linux"]
                  - key: karpenter.k8s.aws/instance-family
                    operator: In
                    values: ["t3"]
                  - key: karpenter.k8s.aws/instance-size
                    operator: In
                    values: ["micro", "small", "medium"]
                  - key: karpenter.sh/capacity-type
                    operator: In
                    values: ["on-demand"]
            limits:
              cpu: "4"
              memory: 8Gi
            disruption:
              consolidationPolicy: WhenUnderutilized
              consolidateAfter: 1m
          EOF

          # 7. 创建占位 Deployment 触发动态扩容
          cat <<-EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: keep-nodes
            namespace: default
          spec:
            replicas: 3
            selector:
              matchLabels:
                app: keep-nodes
            template:
              metadata:
                labels:
                  app: keep-nodes
              spec:
                containers:
                - name: pause
                  image: public.ecr.aws/eks-distro/kubernetes/pause:3.7
                  resources:
                    requests:
                      cpu: "1"
                      memory: 1Gi
          EOF