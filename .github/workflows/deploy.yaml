name: Terraform Deploy EKS with Karpenter

on:
  pull_request:
    types: [closed]
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'modules/**'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]

env:
  TF_VERSION: 1.5.0
  AWS_REGION: us-east-1
  STATE_BUCKET: pengchao2022-terraform-state
  STATE_KEY: eks-karpenter/terraform.tfstate

permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Terraform

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -reconfigure

      # 🚀 Step 1: 全量部署基础设施（包含网络、EKS 底座、以及 Karpenter IAM 角色）
      # 此时由于剥离了 Helm 资源，Terraform 会一气呵成全绿通过！
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="environment=${{ github.event.inputs.environment || 'dev' }}"

      # 📦 Step 2: 完美的后置收尾 - 通过原生 kubectl 和 Helm 注入软件层
      - name: Deploy Karpenter Components via CLI
        run: |
          echo "Connecting to freshly baked EKS Cluster..."
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name allen-eks-karpenter
          
          echo "Adding Karpenter Helm Repository..."
          helm repo add karpenter https://charts.karpenter.sh/
          helm repo update
          
          echo "Installing Karpenter Brain via Helm..."
          CLUSTER_ENDPOINT=$(aws eks describe-cluster --name allen-eks-karpenter --query "cluster.endpoint" --output text)
          ROLE_ARN="arn:aws:iam::317429619308:role/allen-eks-karpenter-karpenter-controller"
          
          helm upgrade --install karpenter karpenter/karpenter \
            --namespace karpenter --create-namespace \
            --version "0.37.0" \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${ROLE_ARN} \
            --set settings.clusterName=allen-eks-karpenter \
            --set settings.clusterEndpoint=${CLUSTER_ENDPOINT} \
            --set settings.interruptionQueue=allen-eks-karpenter \
            --set controller.resources.requests.cpu=100m \
            --set controller.resources.requests.memory=256Mi \
            --set controller.resources.limits.cpu=1 \
            --set controller.resources.limits.memory=1Gi \
            --wait

          echo "Waiting for Karpenter CRDs to be fully established..."
          kubectl wait --for condition=established --timeout=60s crd/nodepools.karpenter.sh crd/ec2nodeclasses.karpenter.k8s.aws

          echo "Applying Karpenter EC2NodeClass Custom Resource..."
          cat <<EOF | kubectl apply -f -
          apiVersion: karpenter.k8s.aws/v1beta1
          kind: EC2NodeClass
          metadata:
            name: default
          spec:
            amiFamily: Ubuntu
            amiSelectorTerms:
              - name: "ubuntu-eks-1.29-*"
            role: "KarpenterNodeRole-allen-eks-karpenter"
            subnetSelectorTerms:
              - tags:
                  karpenter.sh/discovery: allen-eks-karpenter
            securityGroupSelectorTerms:
              - tags:
                  aws:eks:cluster-name: allen-eks-karpenter
            tags:
              karpenter.sh/discovery: allen-eks-karpenter
              Name: allen-eks-karpenter-node
            userData: |
              #!/bin/bash
              set -ex
              cat <<-KUBELET > /etc/default/kubelet
              KUBELET_EXTRA_ARGS="--node-labels=node.kubernetes.io/lifecycle=normal"
              KUBELET
          EOF

          echo "Applying Karpenter NodePool Custom Resource..."
          cat <<EOF | kubectl apply -f -
          apiVersion: karpenter.sh/v1beta1
          kind: NodePool
          metadata:
            name: default
          spec:
            template:
              spec:
                nodeClassRef:
                  name: default
                requirements:
                  - key: kubernetes.io/arch
                    operator: In
                    values: ["amd64"]
                  - key: kubernetes.io/os
                    operator: In
                    values: ["linux"]
                  - key: karpenter.k8s.aws/instance-family
                    operator: In
                    values: ["t3"]
                  - key: karpenter.k8s.aws/instance-size
                    operator: In
                    values: ["micro", "small", "medium"]
                  - key: karpenter.sh/capacity-type
                    operator: In
                    values: ["on-demand"]
                taints: []
                startupTaints: []
            limits:
              cpu: "4"
              memory: 8Gi
            disruption:
              consolidationPolicy: WhenUnderutilized
              expireAfter: 720h
          EOF

          echo "Deploying hold-nodes pause deployment..."
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: keep-nodes
            namespace: default
          spec:
            replicas: 3
            selector:
              matchLabels:
                app: keep-nodes
            template:
              metadata:
                labels:
                  app: keep-nodes
              spec:
                tolerations:
                - operator: Exists
                containers:
                - name: pause
                  image: public.ecr.aws/eks-distro/kubernetes/pause:3.7
                  resources:
                    requests:
                      cpu: 50m
                      memory: 64Mi
                    limits:
                      cpu: 100m
                      memory: 128Mi
          EOF

      # 🔍 Step 3: 最终成果验证
      - name: Verify Cluster and Nodes
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name allen-eks-karpenter
          echo "=== Active Nodes ==="
          kubectl get nodes -o wide
          echo "=== Karpenter CRDs ==="
          kubectl get nodepool
          kubectl get ec2nodeclass

      - name: Terraform Output
        if: always()
        run: |
          echo "## Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          terraform output >> $GITHUB_STEP_SUMMARY || echo "No outputs available"