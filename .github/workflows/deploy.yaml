name: Terraform Deploy EKS with Karpenter

on:
  pull_request:
    types:
      - closed

    paths:
      - '**.tf'
      - '**.tfvars'
      - 'modules/**'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  TF_VERSION: 1.5.0
  AWS_REGION: us-east-1
  STATE_BUCKET: pengchao2022-terraform-state
  STATE_KEY: eks-karpenter/terraform.tfstate

permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Terraform

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -reconfigure

      # 第一步：只部署 VPC 和 EKS
      - name: Deploy VPC and EKS only
        run: |
          terraform apply -auto-approve \
            -target=module.vpc \
            -target=module.eks \
            -var="environment=${{ github.event.inputs.environment || 'dev' }}"

      # 等待 EKS 集群就绪
      - name: Wait for EKS cluster
        run: |
          echo "Waiting for EKS cluster to be ready..."
          aws eks wait cluster-active --name allen-eks-karpenter --region ${{ env.AWS_REGION }}
          echo "EKS cluster is ready!"
          
          # 配置 kubectl
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name allen-eks-karpenter
          
          # 等待节点就绪（Karpenter 会创建节点）
          echo "Waiting for nodes..."
          sleep 60
          kubectl get nodes || true

      # 第二步：部署 Karpenter
      - name: Deploy Karpenter
        run: |
          terraform apply -auto-approve \
            -target=module.karpenter \
            -var="environment=${{ github.event.inputs.environment || 'dev' }}"

      - name: Verify Cluster
        run: |
          kubectl get nodes
          kubectl get pods -n karpenter || true

      - name: Terraform Output
        if: always()
        run: |
          echo "## Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          terraform output >> $GITHUB_STEP_SUMMARY || echo "No outputs available"