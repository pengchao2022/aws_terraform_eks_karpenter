name: Terraform Deploy EKS with Karpenter

on:
  pull_request:
    types:
      - closed
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'modules/**'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  TF_VERSION: 1.5.0
  AWS_REGION: us-east-1
  STATE_BUCKET: pengchao2022-terraform-state
  STATE_KEY: eks-karpenter/terraform.tfstate

permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Terraform

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -reconfigure

      # 🛠️ 第一步：优先部署基础设施与 Helm Release
      # 这样可以在不触发 NodePool/EC2NodeClass 校验报错的情况下，先让 Helm 把 CRD 结构注入集群。
      # 同时由于我们在 main.tf 里加了托管节点组依赖，CoreDNS add-on 也会在这步顺利就绪。
      - name: Terraform Apply (Base & Helm)
        run: |
          terraform apply -auto-approve \
            -target=module.vpc \
            -target=module.eks \
            -target=module.karpenter.helm_release.karpenter \
            -var="environment=${{ github.event.inputs.environment || 'dev' }}"

      # 🚀 第二步：全量 Apply
      # 此时 Kubernetes API Server 已经能够识别 NodePool 和 EC2NodeClass 的 Schema，
      # 直接全量运行可以完美创建所有剩余资源并确立正确的 Terraform 状态。
      - name: Terraform Apply (Full Config & CRDs)
        run: |
          terraform apply -auto-approve \
            -var="environment=${{ github.event.inputs.environment || 'dev' }}"

      # 🔍 验证集群状态
      - name: Verify Cluster and Nodes
        run: |
          echo "Configuring kubectl..."
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name allen-eks-karpenter
          
          echo "Checking system nodes..."
          kubectl get nodes -o wide
          
          echo "Checking Karpenter deployment status..."
          kubectl get pods -n karpenter -o wide || echo "Karpenter namespace or pods not found yet"

      - name: Terraform Output
        if: always()
        run: |
          echo "## Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          terraform output >> $GITHUB_STEP_SUMMARY || echo "No outputs available"