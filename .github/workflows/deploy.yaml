name: Terraform Deploy EKS with Karpenter

on:
  pull_request:
    types: [closed]
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'modules/**'
      - '.github/workflows/deploy.yaml'

env:
  TF_VERSION: 1.5.0
  AWS_REGION: us-east-1 
  STATE_BUCKET: pengchao2022-terraform-state
  STATE_KEY: eks-karpenter/terraform.tfstate

# 🌟 核心安全加固：必须显式声明 OIDC 写入权限，否则 AWS 连不上
permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    name: Terraform Infrastructure Deployment
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false # 🌟 关闭 wrapper，确保能够以纯文本读取 terraform output

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-EKS-Karpenter-Deploy

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -reconfigure \
            -upgrade # 🌟 强力刷新缓存，彻底杜绝 Unexpected attribute 灵异报错

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

      - name: Deploy & Configure Karpenter
        run: |
          # 1. 动态捕获 Terraform 刚刚创建出来的集群资源（零硬编码）
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          CLUSTER_ENDPOINT=$(terraform output -raw cluster_endpoint)
          KARPENTER_ROLE_ARN=$(terraform output -raw karpenter_role_arn)
          
          echo "Connecting to Cluster: $CLUSTER_NAME"
          echo "Using Karpenter Role: $KARPENTER_ROLE_ARN"
          
          # 2. 刷新本地 Kubeconfig 凭证
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name $CLUSTER_NAME
          
          # 3. 安装 K8s 包管理器 Helm
          helm repo add karpenter https://charts.karpenter.sh/
          helm repo update
          
          # 4. 一键注入 Karpenter 软件大脑 (v0.37.0)
          helm upgrade --install karpenter karpenter/karpenter \
            --namespace karpenter --create-namespace \
            --version "0.37.0" \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${KARPENTER_ROLE_ARN} \
            --set settings.clusterName=${CLUSTER_NAME} \
            --set settings.clusterEndpoint=${CLUSTER_ENDPOINT} \
            --set controller.resources.requests.cpu=100m \
            --set controller.resources.requests.memory=256Mi \
            --wait

          # 5. 等待 Karpenter 专属的 CRD 资源在 K8s 集群中完全就绪
          kubectl wait --for condition=established --timeout=60s crd/nodepools.karpenter.sh crd/ec2nodeclasses.karpenter.k8s.aws

          # 6. 下发 EC2NodeClass：指定免费账户可用的 Ubuntu 镜像和子网安全组
          cat <<EOF | kubectl apply -f -
          apiVersion: karpenter.k8s.aws/v1beta1
          kind: EC2NodeClass
          metadata:
            name: default
          spec:
            amiFamily: Ubuntu
            amiSelectorTerms:
              - name: "ubuntu-eks-1.30-*" # 🌟 指定拉起你要求的 Ubuntu 节点
            role: "KarpenterNodeRole-${CLUSTER_NAME}"
            subnetSelectorTerms:
              - tags:
                  karpenter.sh/discovery: ${CLUSTER_NAME}
            securityGroupSelectorTerms:
              - tags:
                  aws:eks:cluster-name: ${CLUSTER_NAME}
            tags:
              karpenter.sh/discovery: ${CLUSTER_NAME}
          EOF

          # 7. 下发 NodePool：严格限制机型在 t3 免费/廉价额度内
          cat <<EOF | kubectl apply -f -
          apiVersion: karpenter.sh/v1beta1
          kind: NodePool
          metadata:
            name: default
          spec:
            template:
              spec:
                nodeClassRef:
                  name: default
                requirements:
                  - key: kubernetes.io/arch
                    operator: In
                    values: ["amd64"]
                  - key: kubernetes.io/os
                    operator: In
                    values: ["linux"]
                  - key: karpenter.k8s.aws/instance-family
                    operator: In
                    values: ["t3"] # 🌟 限制只用 t3 家族，防超支
                  - key: karpenter.k8s.aws/instance-size
                    operator: In
                    values: ["micro", "small", "medium"]
                  - key: karpenter.sh/capacity-type
                    operator: In
                    values: ["on-demand"]
            limits:
              cpu: "4"
              memory: 8Gi
            disruption:
              consolidationPolicy: WhenUnderutilized
              expireAfter: 720h
          EOF

          # 8. 自动扩容：创建占位 Deployment，强行逼迫 Karpenter 拉起 3 个真正的工作 Node
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: keep-nodes
            namespace: default
          spec:
            replicas: 3 # 🌟 完美的 3 个 node 目标
            selector:
              matchLabels:
                app: keep-nodes
            template:
              metadata:
                labels:
                  app: keep-nodes
              spec:
                containers:
                - name: pause
                  image: public.ecr.aws/eks-distro/kubernetes/pause:3.7
                  resources:
                    requests:
                      cpu: "1" # 故意把 CPU 请求设为 1 核，让系统托管组塞不下，从而完美触发 Karpenter 扩容机制
                      memory: 1Gi
          EOF