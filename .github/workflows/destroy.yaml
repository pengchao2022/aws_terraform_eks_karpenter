name: Terraform Destroy EKS Cluster

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DESTROY" to confirm termination'
        required: true
        type: string

env:
  TF_VERSION: 1.5.0
  AWS_REGION: us-east-1 # 🌟 保持与部署流水线一致的东1区
  STATE_BUCKET: pengchao2022-terraform-state
  STATE_KEY: eks-karpenter/terraform.tfstate

# 🌟 核心权限声明：必须允许读取 OIDC Token 才能安全登录 AWS
permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    name: Safe Infrastructure Destruction
    runs-on: ubuntu-latest
    # 🌟 安全防御线：只有当手动输入的字符串完全等于 "DESTROY" 时才允许执行
    if: github.event.inputs.confirm == 'DESTROY'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false # 关闭 wrapper 以便后面顺利读取状态

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-EKS-Karpenter-Destroy

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -reconfigure \
            -upgrade

      - name: Pre-Destroy Cleanup (Kubernetes & Karpenter)
        run: |
          # 1. 动态获取当前的集群名称，防踩空
          CLUSTER_NAME=$(terraform output -raw cluster_name 2>/dev/null || echo "allen-eks-karpenter")
          echo "Target cluster to clean up: $CLUSTER_NAME"
          
          # 2. 刷新 kubeconfig 凭证，尝试连接 K8s 
          if aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name $CLUSTER_NAME 2>/dev/null; then
            echo "Successfully connected to cluster. Starting graceful rollback..."
            
            # 3. 删掉触发扩容的占位副本
            echo "Deleting placeholder deployments..."
            kubectl delete deployment keep-nodes --ignore-not-found --timeout=30s || true
            
            # 4. 彻底删除 Karpenter 节点池和节点类
            # 🌟 这一步极其关键！Karpenter 收到删除信号后，会自动去 AWS 销毁它拉起的所有 Ubuntu EC2 实例。
            echo "Tearing down Karpenter NodePools and EC2NodeClasses..."
            kubectl delete nodepool --all --ignore-not-found --timeout=60s || true
            kubectl delete ec2nodeclass --all --ignore-not-found --timeout=60s || true
            
            # 5. 等待 30 秒给 AWS EC2 足够的时间下线，防止网络残留死锁
            echo "Waiting for dynamic EC2 nodes to terminate..."
            sleep 30
            
            # 6. 用 Helm 彻底卸载 Karpenter 控制面
            echo "Uninstalling Karpenter controller via Helm..."
            helm uninstall karpenter -n karpenter || true
          else
            echo "Cluster already semi-destroyed or unreachable. Proceeding directly to Terraform destroy."
          fi

      - name: Terraform Destroy
        run: |
          # 🌟 终极强拆：清空所有 AWS 基建资产（VPC、EKS 托管组、安全组、网关等）
          terraform destroy -auto-approve -input=false