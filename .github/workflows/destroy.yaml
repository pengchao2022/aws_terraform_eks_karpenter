name: Terraform Destroy EKS Cluster

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DESTROY" to confirm termination'
        required: true
        type: string

env:
  TF_VERSION: 1.5.0
  AWS_REGION: us-east-1 
  STATE_BUCKET: pengchao2022-terraform-state
  STATE_KEY: eks-karpenter/terraform.tfstate

# 🌟 核心权限声明：必须允许读取 OIDC Token 才能安全登录 AWS
permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    name: Safe Infrastructure Destruction
    runs-on: ubuntu-latest
    # 🌟 安全防御线：只有当手动输入的字符串完全等于 "DESTROY" 时才允许执行
    if: github.event.inputs.confirm == 'DESTROY'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false # 关闭 wrapper 以便后面顺利读取状态

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-EKS-Karpenter-Destroy

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=${{ env.STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -reconfigure \
            -upgrade

      - name: Pre-Destroy Cleanup (Kubernetes & Karpenter)
        run: |
          # 1. 动态获取当前的集群名称，防踩空
          CLUSTER_NAME=$(terraform output -raw cluster_name 2>/dev/null || echo "allen-eks-karpenter")
          echo "Target cluster to clean up: $CLUSTER_NAME"
          
          # 2. 刷新 kubeconfig 凭证，尝试连接 K8s 
          if aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name $CLUSTER_NAME 2>/dev/null; then
            echo "Successfully connected to cluster. Starting graceful rollback..."
            
            # 3. 删掉触发扩容的占位副本
            echo "Deleting placeholder deployments..."
            kubectl delete deployment keep-nodes --ignore-not-found --timeout=30s || true
            
            # 4. 彻底删除 Karpenter 节点池和节点类
            # 🌟 优化点 1：将超时时间放大到 5 分钟，确保 AWS 有充足时间销毁物理 EC2 实例。
            # 如果因为网络波动卡住，使用 || true 强制放行，绝不阻断流水线。
            echo "Tearing down Karpenter NodePools and EC2NodeClasses..."
            kubectl delete nodepool --all --ignore-not-found --timeout=5m || true
            kubectl delete ec2nodeclass --all --ignore-not-found --timeout=5m || true
            
            # 🌟 优化点 2：增加兜底策略。万一有 NodePool 卡在 Terminating，强行抹去其 Finalizer 防止死锁。
            echo "Checking for stuck Karpenter resources..."
            for np in $(kubectl get nodepool -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              kubectl patch nodepool $np -p '{"metadata":{"finalizers":null}}' --type=merge || true
            done
            
            # 5. 用 Helm 彻底卸载 Karpenter 控制面
            echo "Uninstalling Karpenter controller via Helm..."
            helm uninstall karpenter -n karpenter || true
            
            # 🌟 优化点 3：顺手卸载之前安装的 Metrics Server，释放占用的 AWS ENI 网卡资源，让基建强拆更丝滑。
            echo "Uninstalling Metrics Server via Helm..."
            helm uninstall metrics-server -n kube-system || true
            
            # 6. 给集群留出最后的 20 秒安息时间
            echo "Waiting for cloud provider resources to settle down..."
            sleep 20
          else
            echo "Cluster already semi-destroyed, unresponsive or unreachable. Proceeding directly to Terraform destroy."
          fi

      - name: Terraform Destroy
        run: |
          # 🌟 终极强拆：清空所有 AWS 基建资产（VPC、EKS 托管组、安全组、网关等）
          terraform destroy -auto-approve -input=false